<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC 5分钟自动交易</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Polymarket BTC 5分钟自动交易</h1>
        </header>

        <nav class="tabs">
            <button class="tab active" data-tab="market">市场</button>
            <button class="tab" data-tab="trades">交易</button>
            <button class="tab" data-tab="config">配置</button>
        </nav>

        <main>
            <section id="market-tab" class="tab-content active">
                <div class="market-info">
                    <div class="market-slug" id="market-slug">加载中...</div>
                    <div class="status" id="status">空闲</div>
                </div>

                <div class="prices">
                    <div class="price-card yes">
                        <span class="label">YES</span>
                        <span class="value" id="yes-price">--</span>
                    </div>
                    <div class="price-card no">
                        <span class="label">NO</span>
                        <span class="value" id="no-price">--</span>
                    </div>
                </div>

                <div class="timer">
                    <div>距开始: <span id="time-start">--</span>秒</div>
                    <div>距结束: <span id="time-end">--</span>秒</div>
                </div>

                <div class="positions" id="positions">
                    <h3>持仓</h3>
                    <div id="positions-list">暂无持仓</div>
                </div>

                <div class="controls">
                    <button id="btn-start">开始交易</button>
                    <button id="btn-stop">停止交易</button>
                </div>
            </section>

            <section id="trades-tab" class="tab-content">
                <h3>交易历史</h3>
                <div id="trades-list" class="trades-list">
                    <p>暂无交易</p>
                </div>
            </section>

            <section id="config-tab" class="tab-content">
                <h3>交易配置</h3>
                <form id="config-form">
                    <div class="form-group">
                        <label>买入价格下限</label>
                        <input type="number" id="buy_price_min" value="18" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>买入价格上限</label>
                        <input type="number" id="buy_price_max" value="22" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>止损</label>
                        <input type="number" id="stop_loss" value="13" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>止盈</label>
                        <input type="number" id="take_profit" value="35" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>滑点 (%)</label>
                        <input type="number" id="slippage" value="10" step="1">
                    </div>
                    <div class="form-group">
                        <label>买入窗口 (分钟)</label>
                        <input type="number" id="buy_window_minutes" value="2" step="1">
                    </div>
                    <div class="form-group">
                        <label>强制平仓 (分钟)</label>
                        <input type="number" id="force_close_minutes" value="1" step="1">
                    </div>
                    <div class="form-group">
                        <label>每市场轮次</label>
                        <input type="number" id="rounds_per_market" value="3" step="1">
                    </div>
                    <div class="form-group">
                        <label>买入金额 (USD)</label>
                        <input type="number" id="buy_amount" value="1.0" step="0.1">
                    </div>
                    <button type="submit">保存配置</button>
                </form>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
